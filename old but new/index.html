<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 પર્સનલ એક્સપેન્સ ટ્રેકર</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>💰 પર્સનલ એક્સપેન્સ ટ્રેકર</h1>
            <p>તમારી આવક અને ખર્ચ ટ્રેક કરો</p>
        </header>

        <!-- Dashboard Cards -->
        <section class="dashboard">
            <div class="card income-card">
                <div class="card-icon">💵</div>
                <div class="card-info">
                    <h3>કુલ આવક</h3>
                    <p class="amount" id="total-income">₹0.00</p>
                </div>
            </div>
            <div class="card expense-card">
                <div class="card-icon">💸</div>
                <div class="card-info">
                    <h3>કુલ ખરચ</h3>
                    <p class="amount" id="total-expense">₹0.00</p>
                </div>
            </div>
            <div class="card balance-card">
                <div class="card-icon">💳</div>
                <div class="card-info">
                    <h3>બાકી રકમ</h3>
                    <p class="amount" id="balance">₹0.00</p>
                </div>
            </div>
        </section>

        <!-- Add Transaction Form -->
        <section class="form-section">
            <h2>📝 નવું ટ્રાન્ઝેક્શન ઉમેરો</h2>
            <form id="transaction-form">
                <div class="form-group">
                    <label for="description">વિગત (Description)</label>
                    <input type="text" id="description" placeholder="ઉદા. પગાર, કિરાયો, કરિયાણું..." required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">રકમ (Amount)</label>
                        <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="type">પ્રકાર (Type)</label>
                        <select id="type" required>
                            <option value="income">📈 આવક (Income)</option>
                            <option value="expense">📉 ખરચ (Expense)</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-submit">➕ ટ્રાન્ઝેક્શન ઉમેરો</button>
            </form>
        </section>

        <!-- Transaction List -->
        <section class="list-section">
            <h2>📋 ટ્રાન્ઝેક્શન લિસ્ટ</h2>
            <div id="transaction-list" class="transaction-list">
                <!-- Transactions will be added here by JavaScript -->
            </div>
            <div id="empty-state" class="empty-state">
                <div class="empty-icon">📭</div>
                <p>હજી સુધી કોઈ ટ્રાન્ઝેક્શન નથી</p>
                <span>ઉપરના ફોર્મમાંથી નવું ટ્રાન્ઝેક્શન ઉમેરો</span>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>💡 ડેટા તમારા બ્રાઉઝરમાં સુરક્ષિત છે (localStorage)</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
